name: Publish API Docs

on:
  workflow_dispatch: {}

# Allow only one concurrent deployment; cancel any in-progress run.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Export OpenAPI schema + Swagger UI
        run: uv run python scripts/export_openapi.py --out-dir _site

      - name: Deploy to live branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          cd _site
          git init -b live
          git add -A
          git commit -m "docs: update Swagger UI [$(date +'%Y-%m-%d %H:%M:%S')] ${{ github.sha }}"
          git push -f "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" live:live
